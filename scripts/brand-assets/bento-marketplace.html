<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
html, body { width: 800px; height: 600px; }
.stage { width: 800px; height: 600px; }

.scene { position: relative; z-index: 2; width: 100%; display: flex; flex-direction: column; align-items: center; gap: 48px; }

.hub-book {
  width: 120px; height: 150px; background: white;
  border: 3px solid var(--navy);
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 16px 32px rgba(15,23,42,0.15);
  position: relative; z-index: 4;
}

.hub-book svg { width: 60%; height: 60%; }

.stores { display: flex; gap: 26px; position: relative; z-index: 3; }
.store {
  width: 140px; height: 110px; border-radius: 18px;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px;
  box-shadow: 0 14px 28px rgba(15,23,42,0.15);
  color: white; padding: 8px;
}
.store:nth-child(1) { background: linear-gradient(135deg, var(--navy), var(--navy-2)); transform: rotate(-4deg); }
.store:nth-child(2) { background: linear-gradient(135deg, var(--orange), var(--orange-2)); transform: rotate(3deg); margin-top: -10px; }
.store:nth-child(3) { background: linear-gradient(135deg, var(--teal), var(--teal-2)); transform: rotate(-2deg); }
.store .label { font-weight: 800; font-size: 13px; letter-spacing: 0.5px; }
.store svg { width: 34px; height: 34px; }

.arrows { position: absolute; inset: 0; z-index: 1; }

.chip {
  position: absolute; bottom: 36px; left: 50%; transform: translateX(-50%);
  padding: 8px 18px; border-radius: 999px;
  background: var(--teal); color: white;
  font-weight: 800; font-size: 12px; letter-spacing: 1.5px; text-transform: uppercase;
  box-shadow: 0 8px 18px rgba(20, 184, 166, 0.3);
  z-index: 5;
}
</style>
</head>
<body>
  <div class="stage">
    <div class="blob orange" style="width:220px; height:220px; top:-60px; right:-60px;"></div>
    <div class="blob teal" style="width:240px; height:240px; bottom:-60px; left:-60px;"></div>
    <div class="dots" style="top: 60px; left: 40px; width: 120px; height: 80px;"></div>

    <div class="scene">
      <svg class="arrows" viewBox="0 0 800 600">
        <path d="M 400 240 Q 240 340 180 420" fill="none" stroke="#f97316" stroke-width="3" stroke-dasharray="3 8" opacity="0.7"/>
        <path d="M 400 240 Q 400 340 400 420" fill="none" stroke="#f97316" stroke-width="3" stroke-dasharray="3 8" opacity="0.7"/>
        <path d="M 400 240 Q 560 340 620 420" fill="none" stroke="#f97316" stroke-width="3" stroke-dasharray="3 8" opacity="0.7"/>
      </svg>

      <div class="hub-book">
        <svg viewBox="0 0 100 100">
          <rect x="10" y="14" width="80" height="72" rx="6" fill="none" stroke="#1e1b4b" stroke-width="4"/>
          <path d="M50 14 V 86" stroke="#1e1b4b" stroke-width="3"/>
          <path d="M22 32 H 42 M 22 44 H 40 M 22 56 H 42" stroke="#1e1b4b" stroke-width="3" stroke-linecap="round"/>
          <path d="M58 32 H 78 M 58 44 H 76 M 58 56 H 78" stroke="#1e1b4b" stroke-width="3" stroke-linecap="round"/>
        </svg>
      </div>

      <div class="stores">
        <div class="store">
          <svg viewBox="0 0 100 100">
            <path d="M10 42 L50 18 L90 42 V 86 H 10 Z" fill="none" stroke="#fff" stroke-width="5" stroke-linejoin="round"/>
            <rect x="42" y="58" width="16" height="28" fill="none" stroke="#fff" stroke-width="4"/>
          </svg>
          <div class="label">Amazon KDP</div>
        </div>
        <div class="store">
          <svg viewBox="0 0 100 100">
            <path d="M20 40 H 80 L 76 78 H 24 Z" fill="none" stroke="#fff" stroke-width="5" stroke-linejoin="round"/>
            <path d="M34 40 V 30 Q 50 20 66 30 V 40" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round"/>
          </svg>
          <div class="label">Etsy</div>
        </div>
        <div class="store">
          <svg viewBox="0 0 100 100">
            <rect x="14" y="24" width="72" height="58" rx="6" fill="none" stroke="#fff" stroke-width="5"/>
            <path d="M26 42 H 74 M 26 58 H 64 M 26 72 H 54" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
          </svg>
          <div class="label">Gumroad</div>
        </div>
      </div>
    </div>

    <div class="chip">Multi-marketplace</div>
  </div>
</body>
</html>
