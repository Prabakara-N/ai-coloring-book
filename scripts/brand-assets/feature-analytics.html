<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
html, body { width: 1200px; height: 900px; }
.stage { width: 1200px; height: 900px; }

.dash { position: relative; z-index: 2; width: 780px; height: 520px; display: grid; grid-template-columns: 1.3fr 1fr; grid-template-rows: 1fr 1fr; gap: 22px; }

.panel {
  background: white; border: 3px solid var(--navy);
  border-radius: 22px;
  padding: 22px;
  box-shadow: 0 20px 40px rgba(15,23,42,0.14);
  position: relative;
  display: flex; flex-direction: column; gap: 10px;
}
.panel .label { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); font-weight: 700; }
.panel .big { font-size: 32px; font-weight: 800; color: var(--navy); line-height: 1; }
.panel .delta { font-size: 13px; color: #059669; font-weight: 700; }

.chart-line { grid-column: 1; grid-row: 1 / span 2; transform: rotate(-2deg); }
.chart-line .chart { flex: 1; position: relative; }
.chart-line .chart svg { width: 100%; height: 100%; }

.chart-donut { grid-column: 2; grid-row: 1; transform: rotate(2deg); }
.chart-donut .donut { display: flex; align-items: center; justify-content: center; flex: 1; }
.chart-donut .donut svg { width: 110px; height: 110px; }

.chart-bar { grid-column: 2; grid-row: 2; background: linear-gradient(135deg, var(--navy), var(--navy-2)); border-color: transparent; color: white; transform: rotate(-3deg); }
.chart-bar .label, .chart-bar .big { color: white; }
.chart-bar .label { color: rgba(255,255,255,0.7); }
.chart-bar .bars { display: flex; align-items: flex-end; gap: 6px; height: 60px; }
.chart-bar .bars span {
  flex: 1; background: var(--orange);
  border-radius: 4px 4px 0 0;
}

.soon-badge {
  position: absolute; top: 60px; right: 80px;
  background: var(--orange); color: white;
  padding: 8px 16px; border-radius: 999px;
  font-weight: 800; font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase;
  box-shadow: 0 10px 20px rgba(249, 115, 22, 0.35);
  transform: rotate(-4deg);
  z-index: 5;
}

.chip {
  position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%);
  padding: 10px 22px; border-radius: 999px;
  background: var(--navy); color: white;
  font-weight: 800; font-size: 13px; letter-spacing: 1.5px; text-transform: uppercase;
  box-shadow: 0 10px 22px rgba(15,23,42,0.15);
  z-index: 5;
}
.chip .accent { color: var(--orange); }
</style>
</head>
<body>
  <div class="stage">
    <div class="blob teal" style="width:340px; height:340px; top:-100px; right:-100px;"></div>
    <div class="blob orange" style="width:300px; height:300px; bottom:-80px; left:-80px;"></div>
    <div class="dots" style="top: 120px; left: 80px; width: 160px; height: 80px;"></div>

    <div class="soon-badge">Coming soon</div>

    <div class="dash">
      <div class="panel chart-line">
        <div class="label">Pinterest → Amazon clicks</div>
        <div class="big">1,248 <span class="delta">↑ 34%</span></div>
        <div class="chart">
          <svg viewBox="0 0 400 200" preserveAspectRatio="none">
            <defs>
              <linearGradient id="fill" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#f97316" stop-opacity="0.22"/>
                <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
              </linearGradient>
            </defs>
            <path d="M 10 160 Q 60 150 90 130 T 150 100 T 220 80 T 290 50 T 380 20"
                  fill="none" stroke="#f97316" stroke-width="5" stroke-linecap="round"/>
            <path d="M 10 160 Q 60 150 90 130 T 150 100 T 220 80 T 290 50 T 380 20 L 380 200 L 10 200 Z"
                  fill="url(#fill)"/>
            <circle cx="380" cy="20" r="7" fill="#f97316" stroke="#fff" stroke-width="3"/>
            <circle cx="290" cy="50" r="5" fill="#f97316"/>
            <circle cx="220" cy="80" r="5" fill="#f97316"/>
            <circle cx="150" cy="100" r="5" fill="#f97316"/>
          </svg>
        </div>
      </div>

      <div class="panel chart-donut">
        <div class="label">Top-performing pins</div>
        <div class="donut">
          <svg viewBox="0 0 100 100">
            <circle cx="50" cy="50" r="40" fill="none" stroke="#e5e7eb" stroke-width="16"/>
            <circle cx="50" cy="50" r="40" fill="none" stroke="#14b8a6" stroke-width="16"
                    stroke-dasharray="251.2" stroke-dashoffset="78" transform="rotate(-90 50 50)"/>
            <circle cx="50" cy="50" r="40" fill="none" stroke="#f97316" stroke-width="16"
                    stroke-dasharray="251.2" stroke-dashoffset="180" transform="rotate(-90 50 50)"/>
          </svg>
        </div>
        <div class="big" style="font-size:18px;">69%</div>
      </div>

      <div class="panel chart-bar">
        <div class="label">Daily sales</div>
        <div class="big">$248 <span class="delta" style="color: #a7f3d0;">↑ 12%</span></div>
        <div class="bars">
          <span style="height: 40%;"></span>
          <span style="height: 60%;"></span>
          <span style="height: 35%;"></span>
          <span style="height: 75%;"></span>
          <span style="height: 55%;"></span>
          <span style="height: 85%;"></span>
          <span style="height: 100%;"></span>
        </div>
      </div>
    </div>

    <div class="chip">Sales <span class="accent">analytics</span> dashboard</div>
  </div>
</body>
</html>
