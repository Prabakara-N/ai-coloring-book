<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
html, body { width: 1200px; height: 900px; }
.stage { width: 1200px; height: 900px; }

.centerpiece { position: relative; z-index: 2; }

.hub {
  width: 340px; height: 460px; border-radius: 32px;
  background: linear-gradient(135deg, var(--navy), var(--navy-2));
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 22px;
  box-shadow: 0 28px 60px rgba(15,23,42,0.2);
  transform: rotate(-3deg);
  position: relative;
}
.hub svg.wand { width: 130px; height: 130px; }
.hub .label { color: white; font-weight: 800; font-size: 18px; letter-spacing: 0.5px; text-align: center; }
.hub .sub { color: rgba(255,255,255,0.75); font-size: 13px; letter-spacing: 1.5px; text-transform: uppercase; font-weight: 700; }

.thumb {
  position: absolute; width: 160px; height: 200px; border-radius: 20px;
  background: white;
  border: 3px solid var(--navy);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 16px 34px rgba(15,23,42,0.18);
}
.thumb svg { width: 65%; height: 65%; }
.thumb.a { top: 20px; left: -40px; transform: rotate(-8deg); }
.thumb.b { top: 50%; left: -80px; transform: translateY(-50%) rotate(4deg); }
.thumb.c { bottom: 30px; left: -20px; transform: rotate(-4deg); }
.thumb.d { top: 40px; right: -20px; transform: rotate(6deg); }
.thumb.e { top: 50%; right: -70px; transform: translateY(-50%) rotate(-3deg); }
.thumb.f { bottom: 40px; right: -40px; transform: rotate(5deg); }

.sparkle {
  position: absolute; font-size: 32px; color: var(--orange);
  z-index: 4;
}

.chip {
  position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%);
  padding: 10px 22px; border-radius: 999px;
  background: var(--orange); color: white;
  font-weight: 800; font-size: 13px; letter-spacing: 1.5px; text-transform: uppercase;
  box-shadow: 0 10px 22px rgba(249, 115, 22, 0.35);
  z-index: 5;
}
</style>
</head>
<body>
  <div class="stage">
    <div class="blob orange" style="width:420px; height:420px; top:-120px; right:-100px;"></div>
    <div class="blob teal" style="width:340px; height:340px; bottom:-100px; left:-80px;"></div>
    <div class="dots" style="top: 120px; left: 80px; width: 160px; height: 80px;"></div>
    <div class="dots" style="bottom: 160px; right: 80px; width: 160px; height: 80px;"></div>

    <div class="centerpiece">
      <div class="thumb a"><svg viewBox="0 0 100 100"><ellipse cx="50" cy="58" rx="22" ry="18" fill="none" stroke="#1e1b4b" stroke-width="4"/><circle cx="50" cy="36" r="10" fill="none" stroke="#1e1b4b" stroke-width="4"/></svg></div>
      <div class="thumb b"><svg viewBox="0 0 100 100"><circle cx="50" cy="55" r="22" fill="none" stroke="#1e1b4b" stroke-width="4"/><circle cx="50" cy="58" r="7" fill="none" stroke="#1e1b4b" stroke-width="3"/></svg></div>
      <div class="thumb c"><svg viewBox="0 0 100 100"><path d="M30 70 Q 30 30 60 30 Q 80 32 80 50" fill="none" stroke="#1e1b4b" stroke-width="4" stroke-linecap="round"/><circle cx="60" cy="44" r="2" fill="#1e1b4b"/></svg></div>
      <div class="thumb d"><svg viewBox="0 0 100 100"><path d="M50 18 L 56 36 L 74 38 L 60 50 L 66 68 L 50 58 L 34 68 L 40 50 L 26 38 L 44 36 Z" fill="none" stroke="#1e1b4b" stroke-width="4" stroke-linejoin="round"/></svg></div>
      <div class="thumb e"><svg viewBox="0 0 100 100"><rect x="25" y="30" width="50" height="50" rx="8" fill="none" stroke="#1e1b4b" stroke-width="4"/><path d="M40 55 L 45 60 L 60 45" fill="none" stroke="#1e1b4b" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      <div class="thumb f"><svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="26" fill="none" stroke="#1e1b4b" stroke-width="4"/><path d="M42 44 Q 50 50 58 44 M 42 60 Q 50 54 58 60" fill="none" stroke="#1e1b4b" stroke-width="3" stroke-linecap="round"/></svg></div>

      <span class="sparkle" style="top: 20px; left: 50%; transform: translateX(-50%);">✨</span>
      <span class="sparkle" style="top: 40%; right: -10px;">✨</span>
      <span class="sparkle" style="bottom: 20px; left: 20px;">✨</span>

      <div class="hub">
        <svg class="wand" viewBox="0 0 120 120">
          <path d="M24 96 L 96 24" stroke="white" stroke-width="10" stroke-linecap="round"/>
          <path d="M82 14 L 96 24 L 106 38" fill="none" stroke="white" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M56 44 L 62 58 L 76 62 L 66 72 L 70 86 L 56 78 L 42 86 L 46 72 L 36 62 L 50 58 Z" fill="#f97316"/>
          <circle cx="36" cy="30" r="4" fill="white"/>
          <circle cx="50" cy="18" r="3" fill="white" opacity=".85"/>
          <circle cx="22" cy="52" r="3" fill="white" opacity=".7"/>
        </svg>
        <div class="sub">Prompt formula</div>
        <div class="label">Generate 20 pages<br/>in minutes</div>
      </div>
    </div>

    <div class="chip">Generation Pipeline</div>
  </div>
</body>
</html>
