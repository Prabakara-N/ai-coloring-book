<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
html, body { width: 1200px; height: 900px; }
.stage { width: 1200px; height: 900px; }

.scene { position: relative; z-index: 2; display: flex; flex-direction: column; align-items: center; gap: 60px; }

.hub-book {
  width: 180px; height: 220px; background: white;
  border: 4px solid var(--navy); border-radius: 18px;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 22px 46px rgba(15,23,42,0.16);
  position: relative; z-index: 4;
  transform: rotate(-3deg);
}
.hub-book svg { width: 65%; height: 65%; }
.hub-book .sparkles {
  position: absolute; top: -14px; right: -14px;
  font-size: 24px;
}

.stores { display: flex; gap: 40px; position: relative; z-index: 3; }
.store {
  width: 200px; height: 160px; border-radius: 24px;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px;
  box-shadow: 0 18px 38px rgba(15,23,42,0.16);
  color: white; padding: 14px;
}
.store:nth-child(1) { background: linear-gradient(135deg, var(--navy), var(--navy-2)); transform: rotate(-5deg); }
.store:nth-child(2) { background: linear-gradient(135deg, var(--orange), var(--orange-2)); transform: rotate(3deg); margin-top: -16px; }
.store:nth-child(3) { background: linear-gradient(135deg, var(--teal), var(--teal-2)); transform: rotate(-2deg); }
.store .label { font-weight: 800; font-size: 18px; letter-spacing: 0.5px; }
.store .sub { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; opacity: 0.85; }
.store svg { width: 48px; height: 48px; }

.arrows { position: absolute; inset: 0; z-index: 1; }

.soon-badge {
  position: absolute; top: 60px; right: 80px;
  background: var(--orange); color: white;
  padding: 8px 16px; border-radius: 999px;
  font-weight: 800; font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase;
  box-shadow: 0 10px 20px rgba(249, 115, 22, 0.35);
  transform: rotate(-4deg);
  z-index: 5;
}

.chip {
  position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%);
  padding: 10px 22px; border-radius: 999px;
  background: var(--teal); color: white;
  font-weight: 800; font-size: 13px; letter-spacing: 1.5px; text-transform: uppercase;
  box-shadow: 0 10px 22px rgba(20, 184, 166, 0.35);
  z-index: 5;
}
</style>
</head>
<body>
  <div class="stage">
    <div class="blob orange" style="width:340px; height:340px; top:-80px; right:-80px;"></div>
    <div class="blob teal" style="width:380px; height:380px; bottom:-100px; left:-100px;"></div>
    <div class="dots" style="top: 120px; left: 80px; width: 160px; height: 80px;"></div>
    <div class="dots" style="bottom: 180px; right: 80px; width: 160px; height: 80px;"></div>

    <div class="soon-badge">Coming soon</div>

    <div class="scene">
      <svg class="arrows" viewBox="0 0 1200 900">
        <path d="M 600 310 Q 380 450 280 600" fill="none" stroke="#f97316" stroke-width="3" stroke-dasharray="3 9" opacity="0.7"/>
        <path d="M 600 310 Q 600 450 600 600" fill="none" stroke="#f97316" stroke-width="3" stroke-dasharray="3 9" opacity="0.7"/>
        <path d="M 600 310 Q 820 450 920 600" fill="none" stroke="#f97316" stroke-width="3" stroke-dasharray="3 9" opacity="0.7"/>
      </svg>

      <div class="hub-book">
        <div class="sparkles">✨</div>
        <svg viewBox="0 0 100 100">
          <rect x="8" y="12" width="84" height="76" rx="7" fill="none" stroke="#1e1b4b" stroke-width="4"/>
          <path d="M50 12 V 88" stroke="#1e1b4b" stroke-width="3.5"/>
          <path d="M22 30 H 42 M 22 44 H 40 M 22 58 H 42 M 22 72 H 38" stroke="#1e1b4b" stroke-width="3" stroke-linecap="round"/>
          <path d="M58 30 H 78 M 58 44 H 76 M 58 58 H 78 M 58 72 H 74" stroke="#1e1b4b" stroke-width="3" stroke-linecap="round"/>
        </svg>
      </div>

      <div class="stores">
        <div class="store">
          <svg viewBox="0 0 100 100">
            <path d="M10 42 L50 18 L90 42 V 86 H 10 Z" fill="none" stroke="#fff" stroke-width="5" stroke-linejoin="round"/>
            <rect x="42" y="58" width="16" height="28" fill="none" stroke="#fff" stroke-width="4"/>
          </svg>
          <div class="label">Amazon</div>
          <div class="sub">KDP</div>
        </div>
        <div class="store">
          <svg viewBox="0 0 100 100">
            <path d="M20 40 H 80 L 76 78 H 24 Z" fill="none" stroke="#fff" stroke-width="5" stroke-linejoin="round"/>
            <path d="M34 40 V 30 Q 50 20 66 30 V 40" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round"/>
          </svg>
          <div class="label">Etsy</div>
          <div class="sub">Digital</div>
        </div>
        <div class="store">
          <svg viewBox="0 0 100 100">
            <rect x="14" y="24" width="72" height="58" rx="6" fill="none" stroke="#fff" stroke-width="5"/>
            <path d="M26 42 H 74 M 26 58 H 64 M 26 72 H 54" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
          </svg>
          <div class="label">Gumroad</div>
          <div class="sub">Products</div>
        </div>
      </div>
    </div>

    <div class="chip">Multi-marketplace publish</div>
  </div>
</body>
</html>
