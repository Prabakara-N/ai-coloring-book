<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
html, body { width: 800px; height: 600px; }
.stage { width: 800px; height: 600px; }

.centerpiece { position: relative; z-index: 2; }

.banana-chip {
  width: 240px; height: 300px;
  background: linear-gradient(135deg, var(--navy), var(--navy-2));
  border-radius: 40px;
  display: flex; align-items: center; justify-content: center;
  transform: rotate(-4deg);
  box-shadow: 0 24px 50px rgba(15,23,42,0.2);
  position: relative;
}
.banana-chip svg { width: 70%; height: 70%; }

.orbit {
  position: absolute; inset: -30px;
  border: 3px dashed rgba(30, 27, 75, 0.25);
  border-radius: 50%;
  animation: none;
}
.orbit-dot {
  position: absolute; width: 16px; height: 16px; border-radius: 50%;
}
.orbit-dot.a { background: var(--orange); top: 8%; right: 20%; }
.orbit-dot.b { background: var(--teal); bottom: 20%; left: 8%; }
.orbit-dot.c { background: var(--navy); top: 50%; right: -8px; }

.chip-label {
  position: absolute; top: -26px; left: 50%; transform: translateX(-50%) rotate(3deg);
  padding: 8px 16px; border-radius: 999px;
  background: var(--orange); color: white;
  font-weight: 800; font-size: 13px; letter-spacing: 1px;
  box-shadow: 0 8px 20px rgba(249, 115, 22, 0.35);
  white-space: nowrap; z-index: 4;
}

.chip {
  position: absolute; bottom: 36px; left: 50%; transform: translateX(-50%);
  padding: 8px 18px; border-radius: 999px;
  background: var(--navy); color: white;
  font-weight: 800; font-size: 12px; letter-spacing: 1.5px; text-transform: uppercase;
  box-shadow: 0 8px 18px rgba(15,23,42,0.15);
  z-index: 3;
}
.chip .accent { color: var(--teal-2); }
</style>
</head>
<body>
  <div class="stage">
    <div class="blob orange" style="width:260px; height:260px; top:-60px; right:-80px;"></div>
    <div class="blob teal" style="width:240px; height:240px; bottom:-80px; left:-60px;"></div>
    <div class="dots" style="top: 80px; left: 60px; width: 100px; height: 80px;"></div>
    <div class="dots" style="bottom: 100px; right: 60px; width: 100px; height: 80px;"></div>

    <div class="centerpiece">
      <div class="orbit"></div>
      <div class="banana-chip">
        <div class="chip-label">~8 sec / page</div>
        <div class="orbit-dot a"></div>
        <div class="orbit-dot b"></div>
        <div class="orbit-dot c"></div>
        <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
          <!-- banana shape -->
          <path d="M40 110 Q 20 60 60 44 Q 80 40 95 52 Q 110 70 140 90 Q 170 110 150 150 Q 130 180 90 170 Q 50 160 40 110 Z"
                fill="#fde047" stroke="#facc15" stroke-width="4" stroke-linejoin="round"/>
          <path d="M55 70 L50 62 L 60 58 L 62 68" fill="#a16207" stroke="#854d0e" stroke-width="2" stroke-linejoin="round"/>
          <!-- circuit lines -->
          <path d="M70 110 H 130 M 85 130 H 120 M 95 90 H 120" stroke="#f97316" stroke-width="3" stroke-linecap="round"/>
          <circle cx="70" cy="110" r="3" fill="#f97316"/>
          <circle cx="130" cy="110" r="3" fill="#f97316"/>
          <circle cx="85" cy="130" r="3" fill="#f97316"/>
          <circle cx="120" cy="130" r="3" fill="#f97316"/>
          <!-- sparkle -->
          <path d="M155 50 L 160 62 L 172 65 L 160 68 L 155 80 L 150 68 L 138 65 L 150 62 Z" fill="#ffffff"/>
        </svg>
      </div>
    </div>

    <div class="chip">Gemini <span class="accent">Nano Banana</span></div>
  </div>
</body>
</html>
