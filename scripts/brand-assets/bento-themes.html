<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
html, body { width: 800px; height: 600px; }
.stage { width: 800px; height: 600px; }
.grid { position: relative; z-index: 2; display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; padding: 48px; width: 100%; }
.t {
  aspect-ratio: 1; border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 32px; background: white;
  border: 2.5px solid var(--navy);
  box-shadow: 0 10px 24px rgba(15,23,42,0.12);
  color: var(--navy);
}
.t:nth-child(odd) { transform: rotate(-3deg); }
.t:nth-child(even) { transform: rotate(3deg); }
.t.v1 { background: var(--navy); color: white; border-color: transparent; }
.t.v2 { background: var(--orange); color: white; border-color: transparent; }
.t.v3 { background: var(--teal); color: white; border-color: transparent; }

.chip {
  position: absolute; bottom: 36px; left: 50%; transform: translateX(-50%);
  padding: 8px 18px; border-radius: 999px;
  background: var(--navy); color: white;
  font-weight: 800; font-size: 12px; letter-spacing: 1.5px; text-transform: uppercase;
  box-shadow: 0 8px 18px rgba(15,23,42,0.15);
  z-index: 3;
}
.chip .accent { color: var(--orange); }
</style>
</head>
<body>
  <div class="stage">
    <div class="blob orange" style="width:260px; height:260px; top:-80px; right:-80px;"></div>
    <div class="blob navy" style="width:220px; height:220px; bottom:-60px; left:-60px;"></div>
    <div class="dots" style="top: 60px; left: 30px; width: 100px; height: 50px;"></div>

    <div class="grid">
      <div class="t v1">🐄</div>
      <div class="t">🦁</div>
      <div class="t v2">🐬</div>
      <div class="t">🦜</div>
      <div class="t v3">🦋</div>
      <div class="t v2">🚒</div>
      <div class="t">🍎</div>
      <div class="t v1">🥕</div>
      <div class="t">🍰</div>
      <div class="t v3">🌈</div>
      <div class="t">🔤</div>
      <div class="t v2">🧸</div>
      <div class="t v1">🦖</div>
      <div class="t">🦄</div>
      <div class="t v3">✨</div>
    </div>

    <div class="chip">14 themes · <span class="accent">280 prompts</span></div>
  </div>
</body>
</html>
