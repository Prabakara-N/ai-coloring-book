<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
html, body { width: 1600px; height: 900px; }
.stage { width: 1600px; height: 900px; }

.stairs { position: relative; z-index: 2; width: 1300px; height: 640px; }
.step {
  position: absolute;
  width: 150px; height: 180px; border-radius: 22px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  box-shadow: 0 18px 40px rgba(15, 23, 42, 0.14);
  color: white; padding: 14px;
}
.step .emoji { font-size: 32px; line-height: 1; margin-bottom: 10px; }
.step .name { font-weight: 800; font-size: 13px; letter-spacing: 0.5px; text-align: center; }
.step .rank {
  position: absolute; top: -14px; left: -14px;
  width: 32px; height: 32px; border-radius: 50%;
  background: white; color: var(--navy);
  display: flex; align-items: center; justify-content: center;
  font-weight: 800; font-size: 14px;
  box-shadow: 0 6px 14px rgba(15,23,42,0.15);
}

.rising-arrow {
  position: absolute; left: 0; top: 0; width: 100%; height: 100%;
  z-index: 1; pointer-events: none;
}

.title-chip {
  position: absolute; top: 60px; left: 50%; transform: translateX(-50%);
  padding: 10px 24px; border-radius: 999px;
  background: var(--navy); color: white;
  font-weight: 800; font-size: 15px;
  box-shadow: 0 8px 20px rgba(15,23,42,0.15);
}
.title-chip .accent { color: var(--orange); }

.tag-2026 {
  position: absolute; bottom: 60px; right: 120px;
  padding: 8px 20px; border-radius: 999px;
  background: var(--orange); color: white;
  font-weight: 800; font-size: 12px; letter-spacing: 2px; text-transform: uppercase;
  box-shadow: 0 8px 20px rgba(249, 115, 22, 0.3);
  transform: rotate(-3deg);
}
</style>
</head>
<body>
  <div class="stage">
    <div class="blob orange" style="width:420px; height:420px; top:-120px; right:-100px;"></div>
    <div class="blob navy" style="width:320px; height:320px; bottom:-80px; left:-80px;"></div>
    <div class="blob teal" style="width:180px; height:180px; top:30%; left:45%;"></div>
    <div class="dots" style="top: 140px; left: 80px; width: 160px; height: 80px;"></div>
    <div class="dots" style="bottom: 140px; right: 80px; width: 160px; height: 80px;"></div>

    <div class="title-chip">7 best-selling niches · <span class="accent">ranked</span></div>
    <div class="tag-2026">2026 EDITION</div>

    <div class="stairs">
      <svg class="rising-arrow" viewBox="0 0 1300 640" preserveAspectRatio="none">
        <path d="M 50 560 Q 220 540 250 470 Q 280 400 420 390 Q 560 380 590 320 Q 620 260 760 250 Q 900 240 930 180 Q 960 120 1100 110 Q 1240 100 1260 60"
              fill="none" stroke="#1e1b4b" stroke-width="4" stroke-linecap="round" stroke-dasharray="3 10" opacity="0.45"/>
        <path d="M 1240 52 L 1265 50 L 1253 70" fill="none" stroke="#1e1b4b" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.65"/>
      </svg>

      <div class="step card navy" style="left: 0; top: 440px; transform: rotate(-5deg);">
        <div class="rank">7</div>
        <div class="emoji">🧘</div>
        <div class="name">Adult Mandala</div>
      </div>
      <div class="step card orange" style="left: 190px; top: 380px; transform: rotate(3deg);">
        <div class="rank">6</div>
        <div class="emoji">🐬</div>
        <div class="name">Sea Creatures</div>
      </div>
      <div class="step card teal" style="left: 380px; top: 320px; transform: rotate(-3deg);">
        <div class="rank">5</div>
        <div class="emoji">🔤</div>
        <div class="name">Alphabet</div>
      </div>
      <div class="step card navy" style="left: 570px; top: 260px; transform: rotate(4deg);">
        <div class="rank">4</div>
        <div class="emoji">🐄</div>
        <div class="name">Farm Animals</div>
      </div>
      <div class="step card orange" style="left: 760px; top: 200px; transform: rotate(-4deg);">
        <div class="rank">3</div>
        <div class="emoji">🚒</div>
        <div class="name">Vehicles</div>
      </div>
      <div class="step card teal" style="left: 950px; top: 140px; transform: rotate(3deg);">
        <div class="rank">2</div>
        <div class="emoji">🦖</div>
        <div class="name">Dinosaurs</div>
      </div>
      <div class="step card navy" style="left: 1140px; top: 80px; transform: rotate(-4deg);">
        <div class="rank">1</div>
        <div class="emoji">🦄</div>
        <div class="name">Unicorns</div>
      </div>
    </div>
  </div>
</body>
</html>
