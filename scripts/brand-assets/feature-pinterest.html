<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
html, body { width: 1200px; height: 900px; }
.stage { width: 1200px; height: 900px; }

.cork-bg {
  position: absolute; inset: 0;
  background-image:
    radial-gradient(circle at 20% 30%, rgba(180, 83, 9, 0.14), transparent 45%),
    radial-gradient(circle at 70% 70%, rgba(180, 83, 9, 0.1), transparent 40%);
}

.pins { position: relative; z-index: 2; display: grid; grid-template-columns: repeat(3, 1fr); gap: 36px; padding: 0 80px; width: 100%; max-width: 1000px; }
.pin { position: relative; }
.pin .card { width: 100%; height: 400px; padding: 28px; flex-direction: column; gap: 18px; }
.pin:nth-child(1) { transform: rotate(-5deg); }
.pin:nth-child(2) { transform: rotate(3deg); margin-top: -20px; }
.pin:nth-child(3) { transform: rotate(-2deg); margin-top: 24px; }

.pin-label {
  background: rgba(255,255,255,0.2);
  padding: 6px 14px; border-radius: 999px;
  font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase;
  font-weight: 700; color: white;
}
.thumb {
  width: 180px; height: 180px; border-radius: 16px;
  background: rgba(255, 255, 255, 0.95);
  display: flex; align-items: center; justify-content: center;
  box-shadow: inset 0 -10px 22px rgba(0,0,0,0.08);
}
.metric { display: flex; flex-direction: column; align-items: center; color: white; }
.metric .v { font-weight: 800; font-size: 30px; }
.metric .l { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; opacity: 0.85; }

.storefront {
  position: absolute; right: 100px; bottom: 100px;
  width: 200px; height: 200px; background: white;
  border-radius: 28px; border: 4px solid var(--navy);
  box-shadow: 0 20px 45px rgba(15, 23, 42, 0.15);
  display: flex; align-items: center; justify-content: center;
  transform: rotate(6deg); z-index: 3;
}
.storefront svg { width: 70%; height: 70%; }

.trail-svg { position: absolute; inset: 0; z-index: 1; pointer-events: none; }

.soon-badge {
  position: absolute; top: 60px; right: 80px;
  background: var(--orange); color: white;
  padding: 8px 16px; border-radius: 999px;
  font-weight: 800; font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase;
  box-shadow: 0 10px 20px rgba(249, 115, 22, 0.35);
  transform: rotate(-4deg);
  z-index: 6;
}

.chip {
  position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%);
  padding: 10px 22px; border-radius: 999px;
  background: var(--navy); color: white;
  font-weight: 800; font-size: 13px; letter-spacing: 1.5px; text-transform: uppercase;
  box-shadow: 0 10px 22px rgba(15, 23, 42, 0.15);
  z-index: 6;
}
</style>
</head>
<body>
  <div class="stage">
    <div class="cork-bg"></div>
    <div class="blob orange" style="width:380px; height:380px; top:-100px; left:-100px;"></div>
    <div class="blob teal" style="width:280px; height:280px; bottom:-80px; right:-40px;"></div>

    <div class="soon-badge">Coming soon</div>

    <svg class="trail-svg" viewBox="0 0 1200 900">
      <path d="M260 500 Q 700 640 1000 760" fill="none" stroke="#1e1b4b" stroke-width="3" stroke-dasharray="3 10" opacity="0.5"/>
      <path d="M600 500 Q 800 680 1000 760" fill="none" stroke="#1e1b4b" stroke-width="3" stroke-dasharray="3 10" opacity="0.4"/>
      <path d="M940 500 Q 960 660 1000 760" fill="none" stroke="#1e1b4b" stroke-width="3" stroke-dasharray="3 10" opacity="0.5"/>
    </svg>

    <div class="pins">
      <div class="pin">
        <div class="pushpin"></div>
        <div class="card navy">
          <div class="thumb">
            <svg viewBox="0 0 100 100" width="120" height="120">
              <rect x="12" y="16" width="76" height="68" rx="6" fill="none" stroke="#1e1b4b" stroke-width="4"/>
              <circle cx="50" cy="44" r="12" fill="none" stroke="#1e1b4b" stroke-width="4"/>
              <path d="M34 70 Q 50 60 66 70" fill="none" stroke="#1e1b4b" stroke-width="4" stroke-linecap="round"/>
            </svg>
          </div>
          <div class="pin-label">Teaser pin</div>
          <div class="metric"><div class="v">12.4k</div><div class="l">Saves</div></div>
        </div>
      </div>
      <div class="pin">
        <div class="pushpin"></div>
        <div class="card orange">
          <div class="thumb">
            <svg viewBox="0 0 100 100" width="120" height="120">
              <rect x="20" y="14" width="60" height="70" rx="6" fill="#fff" stroke="#f97316" stroke-width="4" transform="rotate(-5 50 50)"/>
              <rect x="22" y="18" width="60" height="70" rx="6" fill="#fff" stroke="#f97316" stroke-width="4"/>
              <path d="M32 36 H 72 M32 48 H 68 M32 60 H 70" stroke="#f97316" stroke-width="3" stroke-linecap="round"/>
            </svg>
          </div>
          <div class="pin-label">Carousel</div>
          <div class="metric"><div class="v">8.1k</div><div class="l">Clicks</div></div>
        </div>
      </div>
      <div class="pin">
        <div class="pushpin"></div>
        <div class="card teal">
          <div class="thumb">
            <svg viewBox="0 0 100 100" width="120" height="120">
              <circle cx="50" cy="50" r="34" fill="none" stroke="#14b8a6" stroke-width="5"/>
              <path d="M42 36 L 70 50 L 42 64 Z" fill="#14b8a6"/>
            </svg>
          </div>
          <div class="pin-label">Video pin</div>
          <div class="metric"><div class="v">24.2k</div><div class="l">Plays</div></div>
        </div>
      </div>
    </div>

    <div class="storefront">
      <svg viewBox="0 0 100 100">
        <path d="M10 42 L50 18 L90 42 V 86 H 10 Z" fill="none" stroke="#1e1b4b" stroke-width="5" stroke-linejoin="round"/>
        <rect x="42" y="58" width="16" height="28" fill="none" stroke="#1e1b4b" stroke-width="4"/>
        <circle cx="28" cy="58" r="6" fill="#f97316"/>
        <circle cx="72" cy="58" r="6" fill="#14b8a6"/>
      </svg>
    </div>

    <div class="chip">Pinterest sales engine</div>
  </div>
</body>
</html>
