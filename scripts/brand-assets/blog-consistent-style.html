<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
html, body { width: 1600px; height: 900px; }
.stage { width: 1600px; height: 900px; }

.grid-wrap { position: relative; z-index: 2; padding: 80px; }
.grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 28px; }
.tile {
  aspect-ratio: 3 / 4; border-radius: 22px;
  background: white;
  border: 3px solid var(--navy);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 18px 40px rgba(15, 23, 42, 0.12);
  position: relative;
}
.tile:nth-child(1) { transform: rotate(-4deg); }
.tile:nth-child(2) { transform: rotate(2deg); margin-top: 16px; }
.tile:nth-child(3) { transform: rotate(-2deg); }
.tile:nth-child(4) { transform: rotate(3deg); margin-top: 10px; }
.tile:nth-child(5) { transform: rotate(-3deg); }
.tile:nth-child(6) { transform: rotate(2deg); margin-top: 14px; }

.tile .label {
  position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
  font-size: 11px; font-weight: 700; color: var(--navy);
  letter-spacing: 1px; text-transform: uppercase;
}
.tile svg { width: 60%; height: 60%; }

/* Decorative formula bracket overlay */
.bracket-line {
  position: absolute; z-index: 1;
  pointer-events: none;
}

.title-chip {
  position: absolute; top: 60px; left: 50%; transform: translateX(-50%);
  padding: 10px 24px; border-radius: 999px;
  background: var(--navy); color: white;
  font-weight: 800; font-size: 15px;
  box-shadow: 0 8px 20px rgba(15,23,42,0.15);
  z-index: 3;
}

.sub-chip {
  position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%);
  padding: 8px 18px; border-radius: 999px;
  background: var(--orange); color: white;
  font-weight: 700; font-size: 12px; letter-spacing: 1px; text-transform: uppercase;
  box-shadow: 0 6px 14px rgba(249, 115, 22, 0.3);
  z-index: 3;
}
</style>
</head>
<body>
  <div class="stage">
    <div class="blob orange" style="width:380px; height:380px; top:-120px; right:-80px;"></div>
    <div class="blob navy" style="width:300px; height:300px; bottom:-60px; left:-60px;"></div>
    <div class="blob teal" style="width:160px; height:160px; top:40%; left:5%;"></div>
    <div class="dots" style="top: 100px; left: 60px; width: 140px; height: 80px;"></div>
    <div class="dots" style="bottom: 100px; right: 60px; width: 140px; height: 80px;"></div>

    <div class="title-chip">Same prompt formula · 6 different subjects</div>
    <div class="sub-chip">Visual consistency</div>

    <svg class="bracket-line" style="top: 180px; left: 40px; width: 80px; height: 640px;">
      <path d="M 60 20 Q 20 40 20 100 V 540 Q 20 600 60 620" stroke="#1e1b4b" stroke-width="5" fill="none" stroke-linecap="round"/>
    </svg>
    <svg class="bracket-line" style="top: 180px; right: 40px; width: 80px; height: 640px;">
      <path d="M 20 20 Q 60 40 60 100 V 540 Q 60 600 20 620" stroke="#1e1b4b" stroke-width="5" fill="none" stroke-linecap="round"/>
    </svg>

    <div class="grid-wrap">
      <div class="grid">
        <div class="tile">
          <svg viewBox="0 0 100 100"><!-- cow -->
            <ellipse cx="50" cy="62" rx="28" ry="22" fill="none" stroke="#1e1b4b" stroke-width="4"/>
            <circle cx="50" cy="36" r="14" fill="none" stroke="#1e1b4b" stroke-width="4"/>
            <path d="M40 28 L 36 20 M 60 28 L 64 20" stroke="#1e1b4b" stroke-width="4" stroke-linecap="round"/>
            <circle cx="45" cy="36" r="1.5" fill="#1e1b4b"/>
            <circle cx="55" cy="36" r="1.5" fill="#1e1b4b"/>
          </svg>
          <div class="label">Cow</div>
        </div>
        <div class="tile">
          <svg viewBox="0 0 100 100"><!-- pig -->
            <circle cx="50" cy="50" r="28" fill="none" stroke="#1e1b4b" stroke-width="4"/>
            <circle cx="50" cy="55" r="8" fill="none" stroke="#1e1b4b" stroke-width="3"/>
            <circle cx="47" cy="55" r="1.5" fill="#1e1b4b"/>
            <circle cx="53" cy="55" r="1.5" fill="#1e1b4b"/>
            <path d="M38 30 L 40 22 L 46 26 M 62 30 L 60 22 L 54 26" stroke="#1e1b4b" stroke-width="3" stroke-linejoin="round" fill="none"/>
          </svg>
          <div class="label">Pig</div>
        </div>
        <div class="tile">
          <svg viewBox="0 0 100 100"><!-- sheep -->
            <circle cx="50" cy="55" r="24" fill="none" stroke="#1e1b4b" stroke-width="4"/>
            <circle cx="50" cy="40" r="12" fill="none" stroke="#1e1b4b" stroke-width="4"/>
            <path d="M32 55 a5 5 0 0 1 10 0 M42 55 a5 5 0 0 1 10 0 M52 55 a5 5 0 0 1 10 0 M62 55 a5 5 0 0 1 5 0" fill="none" stroke="#1e1b4b" stroke-width="3"/>
          </svg>
          <div class="label">Sheep</div>
        </div>
        <div class="tile">
          <svg viewBox="0 0 100 100"><!-- duck -->
            <path d="M30 60 Q 30 40 50 38 Q 72 38 74 56 L 80 58 L 72 64 L 62 62 Q 52 72 30 60 Z" fill="none" stroke="#1e1b4b" stroke-width="4"/>
            <circle cx="62" cy="48" r="1.5" fill="#1e1b4b"/>
          </svg>
          <div class="label">Duck</div>
        </div>
        <div class="tile">
          <svg viewBox="0 0 100 100"><!-- rabbit -->
            <circle cx="50" cy="62" r="18" fill="none" stroke="#1e1b4b" stroke-width="4"/>
            <ellipse cx="42" cy="32" rx="5" ry="14" fill="none" stroke="#1e1b4b" stroke-width="4"/>
            <ellipse cx="58" cy="32" rx="5" ry="14" fill="none" stroke="#1e1b4b" stroke-width="4"/>
            <circle cx="45" cy="60" r="1.5" fill="#1e1b4b"/>
            <circle cx="55" cy="60" r="1.5" fill="#1e1b4b"/>
          </svg>
          <div class="label">Rabbit</div>
        </div>
        <div class="tile">
          <svg viewBox="0 0 100 100"><!-- chick -->
            <circle cx="50" cy="55" r="20" fill="none" stroke="#1e1b4b" stroke-width="4"/>
            <path d="M54 52 L 60 48 L 54 44 Z" fill="#f97316" stroke="#1e1b4b" stroke-width="3" stroke-linejoin="round"/>
            <circle cx="46" cy="50" r="2" fill="#1e1b4b"/>
            <path d="M40 75 L 38 80 M 60 75 L 62 80" stroke="#1e1b4b" stroke-width="3" stroke-linecap="round"/>
          </svg>
          <div class="label">Chick</div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
