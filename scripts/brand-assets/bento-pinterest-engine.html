<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
html, body { width: 800px; height: 600px; }
.stage { width: 800px; height: 600px; }

.hub { position: relative; z-index: 2; width: 100%; height: 100%; }

.pin {
  position: absolute; width: 120px; height: 150px; border-radius: 16px;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 14px 30px rgba(15, 23, 42, 0.15);
}
.pin .pushpin { width: 18px; height: 18px; top: -9px; }
.pin.a { background: linear-gradient(135deg, var(--orange), var(--orange-2)); top: 80px; left: 110px; transform: rotate(-6deg); }
.pin.b { background: linear-gradient(135deg, var(--navy), var(--navy-2)); top: 80px; right: 110px; transform: rotate(5deg); }
.pin.c { background: linear-gradient(135deg, var(--teal), var(--teal-2)); top: 300px; left: 260px; transform: rotate(-3deg); }
.pin svg { width: 55%; height: 55%; opacity: 0.95; }

.shop {
  position: absolute; right: 60px; bottom: 120px;
  width: 110px; height: 110px; background: white;
  border: 3px solid var(--navy);
  border-radius: 20px;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 14px 30px rgba(15, 23, 42, 0.12);
  transform: rotate(4deg);
  z-index: 3;
}

.trail-svg { position: absolute; inset: 0; z-index: 1; }

.chip {
  position: absolute; bottom: 36px; left: 50%; transform: translateX(-50%);
  padding: 8px 18px; border-radius: 999px;
  background: var(--orange); color: white;
  font-weight: 800; font-size: 12px; letter-spacing: 1.5px; text-transform: uppercase;
  box-shadow: 0 8px 18px rgba(249, 115, 22, 0.35);
  z-index: 4;
}
</style>
</head>
<body>
  <div class="stage">
    <div class="blob orange" style="width:260px; height:260px; top:-60px; left:-80px;"></div>
    <div class="blob teal" style="width:200px; height:200px; bottom:-60px; right:-40px;"></div>
    <div class="dots" style="top: 40px; right: 60px; width: 120px; height: 80px;"></div>

    <div class="hub">
      <svg class="trail-svg" viewBox="0 0 800 600">
        <path d="M170 220 Q 400 360 680 440" fill="none" stroke="#1e1b4b" stroke-width="3" stroke-dasharray="3 9" opacity="0.5"/>
        <path d="M570 220 Q 630 320 680 440" fill="none" stroke="#1e1b4b" stroke-width="3" stroke-dasharray="3 9" opacity="0.5"/>
        <path d="M380 420 Q 530 430 680 440" fill="none" stroke="#1e1b4b" stroke-width="3" stroke-dasharray="3 9" opacity="0.5"/>
      </svg>

      <div class="pin a">
        <div class="pushpin"></div>
        <svg viewBox="0 0 100 100">
          <rect x="12" y="16" width="76" height="68" rx="6" fill="none" stroke="#fff" stroke-width="4"/>
          <circle cx="50" cy="44" r="12" fill="none" stroke="#fff" stroke-width="4"/>
          <path d="M34 70 Q 50 60 66 70" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="pin b">
        <div class="pushpin"></div>
        <svg viewBox="0 0 100 100">
          <rect x="14" y="20" width="72" height="64" rx="6" fill="none" stroke="#fff" stroke-width="4"/>
          <path d="M24 36 H 76 M 24 50 H 68 M 24 64 H 72" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="pin c">
        <div class="pushpin"></div>
        <svg viewBox="0 0 100 100">
          <circle cx="50" cy="50" r="28" fill="none" stroke="#fff" stroke-width="4"/>
          <path d="M44 40 L 60 50 L 44 60 Z" fill="#fff"/>
        </svg>
      </div>

      <div class="shop">
        <svg viewBox="0 0 100 100">
          <path d="M10 42 L50 18 L90 42 V 86 H 10 Z" fill="none" stroke="#1e1b4b" stroke-width="4" stroke-linejoin="round"/>
          <rect x="42" y="58" width="16" height="28" fill="none" stroke="#1e1b4b" stroke-width="3"/>
          <circle cx="30" cy="58" r="5" fill="#f97316"/>
          <circle cx="70" cy="58" r="5" fill="#14b8a6"/>
        </svg>
      </div>
    </div>

    <div class="chip">Pinterest Engine</div>
  </div>
</body>
</html>
