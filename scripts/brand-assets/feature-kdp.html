<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
html, body { width: 1200px; height: 900px; }
.stage { width: 1200px; height: 900px; }

.centerpiece { position: relative; z-index: 2; display: flex; gap: 40px; align-items: center; }

.book {
  position: relative;
  width: 300px; height: 400px;
  background: white; border: 4px solid var(--navy);
  border-radius: 22px;
  box-shadow: 0 22px 46px rgba(15,23,42,0.18);
  transform: rotate(-4deg);
  display: flex; flex-direction: column; padding: 30px;
  gap: 14px;
}
.book::before {
  content: '';
  position: absolute; left: 50%; top: 0; bottom: 0;
  border-left: 2px solid rgba(30,27,75,0.2);
}
.book .line { height: 8px; border-radius: 4px; background: rgba(30,27,75,0.12); }
.book .line.s { width: 50%; }

.book .illus {
  margin-top: 8px; flex: 1;
  border: 2.5px solid var(--navy); border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
}
.book .illus svg { width: 60%; height: 60%; }

.pdf-stack {
  position: relative;
  width: 260px; height: 360px;
}
.pdf-card {
  position: absolute; width: 100%; height: 100%;
  background: white; border: 3px solid var(--navy);
  border-radius: 20px;
  display: flex; flex-direction: column; padding: 26px; gap: 12px;
  box-shadow: 0 18px 40px rgba(15,23,42,0.15);
}
.pdf-card .line { height: 6px; border-radius: 3px; background: rgba(30,27,75,0.12); }
.pdf-card .line.s { width: 60%; }

.pdf-card.c3 { transform: translate(40px, 40px) rotate(6deg); background: #fef3c7; }
.pdf-card.c2 { transform: translate(20px, 20px) rotate(3deg); background: #fff7ed; }
.pdf-card.c1 { transform: rotate(-3deg); }

.pdf-card.c1 .badge {
  position: absolute; top: -16px; right: -16px;
  background: var(--orange); color: white;
  padding: 8px 14px; border-radius: 999px;
  font-weight: 800; font-size: 13px;
  box-shadow: 0 8px 18px rgba(249, 115, 22, 0.35);
  transform: rotate(8deg);
}

.ruler {
  position: absolute; bottom: -30px; right: -40px;
  width: 300px; height: 50px;
  background: linear-gradient(135deg, var(--teal), var(--teal-2));
  border-radius: 8px;
  transform: rotate(-8deg);
  box-shadow: 0 12px 26px rgba(20, 184, 166, 0.3);
  padding: 8px 12px;
  color: white; display: flex; flex-direction: column; justify-content: space-between;
  font-weight: 800;
  z-index: 5;
}
.ruler .rtop { font-size: 13px; letter-spacing: 1px; }
.ruler .rticks { display: flex; gap: 8px; align-items: flex-end; height: 14px; }
.ruler .rticks span { width: 1.5px; background: white; height: 8px; display: block; }
.ruler .rticks span:nth-child(5n+1) { height: 14px; }

.chip {
  position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%);
  padding: 10px 22px; border-radius: 999px;
  background: var(--teal); color: white;
  font-weight: 800; font-size: 13px; letter-spacing: 1.5px; text-transform: uppercase;
  box-shadow: 0 10px 22px rgba(20, 184, 166, 0.35);
  z-index: 6;
}
</style>
</head>
<body>
  <div class="stage">
    <div class="blob teal" style="width:420px; height:420px; top:-120px; right:-80px;"></div>
    <div class="blob navy" style="width:320px; height:320px; bottom:-80px; left:-80px;"></div>
    <div class="dots" style="top: 120px; right: 120px; width: 160px; height: 80px;"></div>
    <div class="dots" style="bottom: 180px; left: 80px; width: 160px; height: 80px;"></div>

    <div class="centerpiece">
      <div class="book">
        <div class="line"></div>
        <div class="line s"></div>
        <div class="illus">
          <svg viewBox="0 0 100 100">
            <ellipse cx="50" cy="58" rx="22" ry="18" fill="none" stroke="#1e1b4b" stroke-width="3.5"/>
            <circle cx="50" cy="36" r="10" fill="none" stroke="#1e1b4b" stroke-width="3.5"/>
            <path d="M43 32 L 40 26 M 57 32 L 60 26" stroke="#1e1b4b" stroke-width="3" stroke-linecap="round"/>
          </svg>
        </div>
      </div>

      <div class="pdf-stack">
        <div class="pdf-card c3"><div class="line"></div><div class="line s"></div></div>
        <div class="pdf-card c2"><div class="line"></div><div class="line s"></div></div>
        <div class="pdf-card c1">
          <div class="badge">300 DPI</div>
          <div class="line"></div>
          <div class="line s"></div>
          <div class="line"></div>
          <div class="line s"></div>
          <div class="line"></div>
        </div>

        <div class="ruler">
          <div class="rtop">8.5 × 11 in</div>
          <div class="rticks">
            <span></span><span></span><span></span><span></span><span></span>
            <span></span><span></span><span></span><span></span><span></span>
            <span></span><span></span><span></span><span></span><span></span>
            <span></span><span></span><span></span><span></span><span></span>
            <span></span>
          </div>
        </div>
      </div>
    </div>

    <div class="chip">KDP-ready output</div>
  </div>
</body>
</html>
