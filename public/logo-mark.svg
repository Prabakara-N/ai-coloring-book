<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="CrayonSparks logo">
  <defs>
    <linearGradient id="cs-bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="cs-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <radialGradient id="cs-glow" cx="32" cy="32" r="22" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="64" height="64" rx="14" fill="url(#cs-bg)"/>
  <circle cx="32" cy="32" r="22" fill="url(#cs-glow)"/>

  <!-- Crayon (white body), rotated 35° then nudged down-right for balance -->
  <g transform="translate(4 3) rotate(35 32 32)">
    <polygon points="0,32 12,26 12,38" fill="url(#cs-body)"/>
    <polygon points="2.5,32 12,29.5 12,34.5" fill="#fef3c7"/>
    <rect x="12" y="26" width="42" height="12" fill="url(#cs-body)"/>
    <rect x="17" y="26" width="3.5" height="12" fill="#7c3aed"/>
    <line x1="17" y1="28.5" x2="20.5" y2="28.5" stroke="#5b21b6" stroke-width="0.5"/>
    <line x1="17" y1="35.5" x2="20.5" y2="35.5" stroke="#5b21b6" stroke-width="0.5"/>
    <rect x="50" y="26" width="4" height="12" fill="#cbd5e1"/>
  </g>

  <!-- Accent sparkles in corners -->
  <g transform="translate(50 14)" fill="#ffffff">
    <path d="M0 -4 C0.5 -1.3 1.3 -0.5 4 0 C1.3 0.5 0.5 1.3 0 4 C-0.5 1.3 -1.3 0.5 -4 0 C-1.3 -0.5 -0.5 -1.3 0 -4 Z"/>
  </g>
  <g transform="translate(56 22)" fill="#ffffff" opacity="0.8">
    <path d="M0 -2.5 C0.3 -0.8 0.8 -0.3 2.5 0 C0.8 0.3 0.3 0.8 0 2.5 C-0.3 0.8 -0.8 0.3 -2.5 0 C-0.8 -0.3 -0.3 -0.8 0 -2.5 Z"/>
  </g>
  <g transform="translate(14 52)" fill="#ffffff" opacity="0.7">
    <path d="M0 -3 C0.4 -1 1 -0.4 3 0 C1 0.4 0.4 1 0 3 C-0.4 1 -1 0.4 -3 0 C-1 -0.4 -0.4 -1 0 -3 Z"/>
  </g>
</svg>
